<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
<rect width="1500" height="520" fill="#f8f8f8"/>
<text x="30" y="40" font-family="Arial" font-size="28" fill="#222">Figure A2 MobileViT Bottleneck Block Architecture</text>
<text x="30" y="72" font-family="Arial" font-size="16" fill="#555">Used inside the CNN enhancement network: dim=64, depth=2, heads=2</text>
<rect x="30" y="170" rx="18" ry="18" width="170" height="96" fill="#dfeffc" stroke="#17324d" stroke-width="2"/>
<text x="115.0" y="198" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#183147">Input Feature Map</text>
<text x="115.0" y="228" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">B x 64 x 64 x 64</text>
<rect x="250" y="150" rx="18" ry="18" width="220" height="136" fill="#9ed8e6" stroke="#17324d" stroke-width="2"/>
<text x="360.0" y="178" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#183147">Local Conv Block</text>
<text x="360.0" y="208" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">Conv2d 64->64, k=3, p=1</text>
<text x="360.0" y="230" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">BatchNorm2d(64)</text>
<text x="360.0" y="252" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">ReLU</text>
<rect x="520" y="170" rx="18" ry="18" width="180" height="96" fill="#dcecf3" stroke="#17324d" stroke-width="2"/>
<text x="610.0" y="198" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#183147">Flatten + Permute</text>
<text x="610.0" y="228" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">(B,64,H,W) -></text>
<text x="610.0" y="250" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">(B, HxW, 64)</text>
<rect x="750" y="130" rx="18" ry="18" width="280" height="176" fill="#ffd58f" stroke="#17324d" stroke-width="2"/>
<text x="890.0" y="158" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#183147">Transformer Encoder</text>
<text x="890.0" y="188" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">2 encoder layers</text>
<text x="890.0" y="210" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">nhead = 2</text>
<text x="890.0" y="232" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">FFN: 64 -> 128 -> 64</text>
<text x="890.0" y="254" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">dropout = 0.1</text>
<text x="890.0" y="276" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">norm_first = True</text>
<rect x="1080" y="170" rx="18" ry="18" width="170" height="96" fill="#dcecf3" stroke="#17324d" stroke-width="2"/>
<text x="1165.0" y="198" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#183147">Reshape Back</text>
<text x="1165.0" y="228" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">(B, HxW, 64) -></text>
<text x="1165.0" y="250" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">(B,64,H,W)</text>
<rect x="1290" y="150" rx="18" ry="18" width="180" height="136" fill="#c9ebb8" stroke="#17324d" stroke-width="2"/>
<text x="1380.0" y="178" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#183147">Projection Conv</text>
<text x="1380.0" y="208" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">Conv2d 64->64, k=1</text>
<text x="1380.0" y="230" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">BatchNorm2d(64)</text>
<text x="1380.0" y="252" text-anchor="middle" font-family="Arial" font-size="15" fill="#183147">Output + identity</text>
<line x1="200" y1="218" x2="250" y2="218" stroke="#555" stroke-width="3"/>
<polygon points="250,218 238,212 238,224" fill="#555"/>
<line x1="470" y1="218" x2="520" y2="218" stroke="#555" stroke-width="3"/>
<polygon points="520,218 508,212 508,224" fill="#555"/>
<line x1="700" y1="218" x2="750" y2="218" stroke="#555" stroke-width="3"/>
<polygon points="750,218 738,212 738,224" fill="#555"/>
<line x1="1030" y1="218" x2="1080" y2="218" stroke="#555" stroke-width="3"/>
<polygon points="1080,218 1068,212 1068,224" fill="#555"/>
<line x1="1250" y1="218" x2="1290" y2="218" stroke="#555" stroke-width="3"/>
<polygon points="1290,218 1278,212 1278,224" fill="#555"/>
<path d="M 115 160 C 115 90, 1380 90, 1380 150" fill="none" stroke="#7a4f9a" stroke-width="3" stroke-dasharray="8 6"/>
<text x="700" y="82" text-anchor="middle" font-family="Arial" font-size="16" fill="#7a4f9a">Residual / identity connection</text>
</svg>