<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="500" viewBox="0 0 1380 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f6fb"/>
      <stop offset="100%" stop-color="#f9fcfd"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#17324d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1380" height="500" fill="url(#bg)"/>
  <text x="690" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f2740">
    Underwater Enhancement Network
  </text>

  <rect x="70" y="140" rx="18" ry="18" width="300" height="180" fill="#9ed8e6" stroke="#17324d" stroke-width="2"/>
<text x="220.0" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#102030">Encoder</text>
<text x="220.0" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Conv block x 2</text>
<text x="220.0" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Downsampling</text>
<text x="220.0" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Feature extraction</text>
  <rect x="540" y="110" rx="18" ry="18" width="300" height="240" fill="#ffd58f" stroke="#17324d" stroke-width="2"/>
<text x="690.0" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#102030">MobileViT Bottleneck</text>
<text x="690.0" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Local convolutions</text>
<text x="690.0" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Lightweight self-attention</text>
<text x="690.0" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Global context fusion</text>
<text x="690.0" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Compact latent features</text>
  <rect x="1010" y="140" rx="18" ry="18" width="300" height="180" fill="#b8e3b0" stroke="#17324d" stroke-width="2"/>
<text x="1160.0" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#102030">Decoder</text>
<text x="1160.0" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Upsampling</text>
<text x="1160.0" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Reconstruction layers</text>
<text x="1160.0" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e2f3f">Enhanced RGB output</text>

  <line x1="370" y1="230" x2="540" y2="230" stroke="#17324d" stroke-width="4" marker-end="url(#arrowhead)"/>
<text x="455.0" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#35516a">Encoded feature maps</text>
  <line x1="840" y1="230" x2="1010" y2="230" stroke="#17324d" stroke-width="4" marker-end="url(#arrowhead)"/>
<text x="925.0" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#35516a">Context-enriched features</text>

  <rect x="65" y="380" rx="14" ry="14" width="1245" height="70" fill="#ffffff" stroke="#bfd3df" stroke-width="1.5"/>
  <text x="690" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#16314a">
    Flow: Input underwater image -> Encoder -> MobileViT bottleneck -> Decoder -> Enhanced image
  </text>
  <text x="690" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#35516a">
    Use this SVG directly in slides, reports, or convert it to PNG in any browser if needed.
  </text>
</svg>
